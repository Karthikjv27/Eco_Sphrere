<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Environmental Goals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('goals')}"></div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h4>Add Environmental Goal</h4>
        </div>

        <div class="card-body">

            <form action="/goals/save" method="post">

                <div class="mb-3">
                    <label class="form-label">Goal Name</label>
                    <input type="text"
                           class="form-control"
                           name="goalName"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control"
                              name="description"
                              rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Value</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="targetValue"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Unit</label>
                    <input type="text"
                           class="form-control"
                           name="targetUnit"
                           placeholder="kg CO₂, %, Trees..."
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Date</label>
                    <input type="date"
                           class="form-control"
                           name="targetDate"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>

                    <select class="form-select"
                            name="status">

                        <option value="PENDING">Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>

                    <select class="form-select"
                            name="departmentId">

                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}">
                        </option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Save Goal
                </button>

            </form>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header">
            <h4>Environmental Goals</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-success">

                <tr>

                    <th>ID</th>
                    <th>Goal</th>
                    <th>Target</th>
                    <th>Unit</th>
                    <th>Status</th>
                    <th>Deadline</th>
                    <th>Department</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="goal : ${goals}">

                    <td th:text="${goal.id}"></td>

                    <td th:text="${goal.goalName}"></td>

                    <td th:text="${goal.targetValue}"></td>

                    <td th:text="${goal.targetUnit}"></td>

                    <td th:text="${goal.status}"></td>

                    <td th:text="${goal.targetDate}"></td>

                    <td th:text="${goal.department.name}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
