<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EcoSphere Notifications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('notifications')}"></div>

<div class="container mt-4">
    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-0">Notifications</h4>
                        <small class="text-muted">All system alerts, reminders, and ESG updates.</small>
                    </div>
                    <form action="/notifications/read-all" method="post" class="mb-0">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="fas fa-check-double me-2"></i>Mark All Read
                        </button>
                    </form>
                </div>
                <div class="card-body">
                    <div class="list-group">
                        <div class="list-group-item list-group-item-action flex-column align-items-start"
                             th:each="notification : ${notifications}">
                            <div class="d-flex w-100 justify-content-between">
                                <h5 class="mb-1" th:text="${notification.title}"></h5>
                                <small class="text-muted" th:text="${notification.createdAt}"></small>
                            </div>
                            <p class="mb-1" th:text="${notification.message}"></p>
                            <div class="d-flex gap-2">
                                <span class="badge bg-info text-dark" th:text="${notification.type}"></span>
                                <span class="badge bg-secondary" th:text="${notification.priority}"></span>
                                <span class="badge" th:classappend="${notification.readStatus} ? 'bg-success' : 'bg-danger'" th:text="${notification.readStatus} ? 'Read' : 'Unread'"></span>
                            </div>
                            <form th:action="@{/notifications/read/{id}(id=${notification.id})}" method="post" class="mt-3">
                                <button type="submit" class="btn btn-sm btn-outline-success">Mark as Read</button>
                            </form>
                        </div>
                        <div class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(notifications)}">
                            No notifications available.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow">
                <div class="card-header">
                    Notification Summary
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <h5 class="mb-1">Unread Alerts</h5>
                        <p class="display-6 fw-bold mb-0" th:text="${unreadCount}"></p>
                    </div>
                    <div class="mb-3">
                        <p class="mb-1 text-muted">Recent priority items</p>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                High priority
                                <span class="badge bg-danger rounded-pill">3</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Reminders
                                <span class="badge bg-warning rounded-pill">1</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                System alerts
                                <span class="badge bg-info text-dark rounded-pill">1</span>
                            </li>
                        </ul>
                    </div>
                    <a href="/reports" class="btn btn-primary w-100">
                        <i class="fas fa-file-alt me-2"></i>View ESG Reports
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
