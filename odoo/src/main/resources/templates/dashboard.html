<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EcoSphere Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .chart-card canvas {
            max-height: 280px;
        }
    </style>
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>

<div class="container mt-4">

    <div class="row g-3">

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h6 class="text-muted">Total Departments</h6>
                    <h2 class="text-primary mb-0" th:text="${departmentCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h6 class="text-muted">Carbon Transactions</h6>
                    <h2 class="text-success mb-0" th:text="${carbonCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h6 class="text-muted">CSR Projects</h6>
                    <h2 class="text-info mb-0" th:text="${csrCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h6 class="text-muted">Sustainability Goals</h6>
                    <h2 class="text-warning mb-0" th:text="${goalCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h6 class="text-muted">ESG Policies</h6>
                    <h2 class="text-secondary mb-0" th:text="${policyCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted">Overall ESG Score</h6>
                    <h1 class="text-success mb-0" th:text="${score.overallScore} + '%'"></h1>
                </div>
            </div>
        </div>

    </div>

    <div class="row g-3 mt-1">

        <div class="col-lg-6">
            <div class="card shadow h-100 chart-card">
                <div class="card-header">
                    Carbon Trend
                </div>
                <div class="card-body">
                    <canvas id="carbonTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow h-100 chart-card">
                <div class="card-header">
                    Department Emissions
                </div>
                <div class="card-body">
                    <canvas id="departmentEmissionChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow h-100 chart-card">
                <div class="card-header">
                    Goal Status
                </div>
                <div class="card-body">
                    <canvas id="goalStatusChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow h-100 chart-card">
                <div class="card-header">
                    CSR and Policy Summary
                </div>
                <div class="card-body">
                    <canvas id="csrPolicyChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header">

            Recent Carbon Transactions

        </div>

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Activity</th>
                    <th>Department</th>
                    <th>Emission</th>
                    <th>Date</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="t : ${recentTransactions}">

                    <td th:text="${t.id}"></td>

                    <td th:text="${t.activityName}"></td>

                    <td th:text="${t.department.name}"></td>

                    <td th:text="${t.emissionValue} + ' ' + ${t.emissionUnit}"></td>

                    <td th:text="${t.transactionDate}"></td>

                </tr>

                <tr th:if="${#lists.isEmpty(recentTransactions)}">
                    <td colspan="5" class="text-center text-muted">
                        No carbon transactions recorded yet.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const carbonTrendLabels = /*[[${carbonTrendLabels}]]*/ [];
    const carbonTrendData = /*[[${carbonTrendData}]]*/ [];
    const departmentEmissionLabels = /*[[${departmentEmissionLabels}]]*/ [];
    const departmentEmissionData = /*[[${departmentEmissionData}]]*/ [];
    const goalStatusLabels = /*[[${goalStatusLabels}]]*/ [];
    const goalStatusData = /*[[${goalStatusData}]]*/ [];
    const csrPolicyLabels = /*[[${csrPolicyLabels}]]*/ [];
    const csrPolicyData = /*[[${csrPolicyData}]]*/ [];

    new Chart(document.getElementById('carbonTrendChart'), {
        type: 'line',
        data: {
            labels: carbonTrendLabels,
            datasets: [{
                label: 'CO2 Emissions',
                data: carbonTrendData,
                borderColor: '#198754',
                backgroundColor: 'rgba(25, 135, 84, 0.15)',
                fill: true,
                tension: 0.35
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    new Chart(document.getElementById('departmentEmissionChart'), {
        type: 'bar',
        data: {
            labels: departmentEmissionLabels,
            datasets: [{
                label: 'CO2 Emissions',
                data: departmentEmissionData,
                backgroundColor: '#0d6efd'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    new Chart(document.getElementById('goalStatusChart'), {
        type: 'pie',
        data: {
            labels: goalStatusLabels,
            datasets: [{
                data: goalStatusData,
                backgroundColor: ['#ffc107', '#0d6efd', '#198754']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    new Chart(document.getElementById('csrPolicyChart'), {
        type: 'doughnut',
        data: {
            labels: csrPolicyLabels,
            datasets: [{
                data: csrPolicyData,
                backgroundColor: ['#0dcaf0', '#6c757d']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

</body>
</html>
