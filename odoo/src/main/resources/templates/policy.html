<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Policy Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('policies')}"></div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h4>Add Policy</h4>
        </div>

        <div class="card-body">

            <form action="/policy/save" method="post">

                <div class="mb-3">
                    <label class="form-label">Policy Name</label>
                    <input
                            type="text"
                            class="form-control"
                            name="policyName"
                            required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>

                    <textarea
                            class="form-control"
                            rows="3"
                            name="description"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>

                    <select
                            class="form-select"
                            name="status">

                        <option>Draft</option>
                        <option>Active</option>
                        <option>Archived</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Department</label>

                    <select
                            class="form-select"
                            name="departmentId"
                            required>

                        <option value="">Select Department</option>

                        <option
                                th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}">
                        </option>

                    </select>

                </div>

                <button
                        class="btn btn-success"
                        type="submit">

                    Save Policy

                </button>

            </form>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header">
            <h4>Policies</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-success">

                <tr>

                    <th>ID</th>
                    <th>Policy</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Department</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="policy : ${policies}">

                    <td th:text="${policy.id}"></td>

                    <td th:text="${policy.policyName}"></td>

                    <td th:text="${policy.description}"></td>

                    <td th:text="${policy.status}"></td>

                    <td th:text="${policy.department.name}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
