<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('departments')}"></div>

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header">
            <h4 class="mb-0">Add Department</h4>
        </div>

        <div class="card-body">
            <form action="/departments/save" method="post">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text"
                           class="form-control"
                           name="name"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text"
                           class="form-control"
                           name="description">
                </div>

                <button type="submit" class="btn btn-success">
                    Save Department
                </button>
            </form>
        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-header">
            <h4 class="mb-0">Departments</h4>
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="dept : ${departments}">
                        <td th:text="${dept.id}"></td>
                        <td th:text="${dept.name}"></td>
                        <td th:text="${dept.description}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="3" class="text-center text-muted">
                            No departments added yet.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
