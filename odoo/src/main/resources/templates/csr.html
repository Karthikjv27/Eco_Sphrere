<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>CSR Activities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">🌍 EcoSphere ESG</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/departments/page">Departments</a>
            <a class="nav-link" href="/carbon/page">Carbon</a>
            <a class="nav-link" href="/goals/page">Goals</a>
            <a class="nav-link active" href="/csr/page">CSR</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h4>Add CSR Activity</h4>
        </div>

        <div class="card-body">

            <form action="/csr/save" method="post">

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text"
                           class="form-control"
                           name="title"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control"
                              name="description"
                              rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Participants</label>
                    <input type="number"
                           class="form-control"
                           name="participants"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Activity Date</label>
                    <input type="date"
                           class="form-control"
                           name="activityDate"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>

                    <select class="form-select"
                            name="departmentId"
                            required>

                        <option value="">Select Department</option>

                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}">
                        </option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Save Activity
                </button>

            </form>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header">
            <h4>CSR Activities</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-success">

                <tr>

                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Participants</th>
                    <th>Date</th>
                    <th>Department</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="activity : ${activities}">

                    <td th:text="${activity.id}"></td>

                    <td th:text="${activity.title}"></td>

                    <td th:text="${activity.description}"></td>

                    <td th:text="${activity.participants}"></td>

                    <td th:text="${activity.activityDate}"></td>

                    <td th:text="${activity.department.name}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
