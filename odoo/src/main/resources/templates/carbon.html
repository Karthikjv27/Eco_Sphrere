<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Carbon Transactions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar('carbon')}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Carbon Transactions</h2>

    <div class="card shadow mb-4">

        <div class="card-header">
            Add Carbon Transaction
        </div>

        <div class="card-body">

            <form action="/carbon/save" method="post">

                <div class="mb-3">
                    <label class="form-label">Activity Name</label>
                    <input type="text"
                           class="form-control"
                           name="activityName"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Emission Value</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="emissionValue"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Emission Unit</label>

                    <select class="form-select"
                            name="emissionUnit">

                        <option>kg CO2</option>
                        <option>ton CO2</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Transaction Date</label>

                    <input type="date"
                           class="form-control"
                           name="transactionDate">
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>

                    <select class="form-select"
                            name="departmentId">

                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}">
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Save Transaction
                </button>

            </form>

        </div>

    </div>

    <div class="card shadow">
        <div class="card-header">
            Carbon Transaction Records
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-success">

                    <tr>

                        <th>ID</th>
                        <th>Activity</th>
                        <th>Emission</th>
                        <th>Unit</th>
                        <th>Date</th>
                        <th>Department</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="t : ${transactions}">

                        <td th:text="${t.id}"></td>

                        <td th:text="${t.activityName}"></td>

                        <td th:text="${t.emissionValue}"></td>

                        <td th:text="${t.emissionUnit}"></td>

                        <td th:text="${t.transactionDate}"></td>

                        <td th:text="${t.department.name}"></td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(transactions)}">
                        <td colspan="6" class="text-center text-muted">
                            No carbon transactions recorded yet.
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
