<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>EcoSphere Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">
        🌍 EcoSphere ESG Summary Report
    </h2>

    <table class="table table-bordered">

        <tr>
            <th>Departments</th>
            <td th:text="${departments}"></td>
        </tr>

        <tr>
            <th>Carbon Transactions</th>
            <td th:text="${carbon}"></td>
        </tr>

        <tr>
            <th>Environmental Goals</th>
            <td th:text="${goals}"></td>
        </tr>

        <tr>
            <th>CSR Activities</th>
            <td th:text="${csr}"></td>
        </tr>

        <tr>
            <th>Policies</th>
            <td th:text="${policies}"></td>
        </tr>

        <tr class="table-success">

            <th>Overall ESG Score</th>

            <td>
                <span th:text="${score.overallScore}"></span> %
            </td>

        </tr>

    </table>

</div>

</body>

</html>
